<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANT China Supplier - Freight System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4361ee; --light: #f8f9fa; --border: #e9ecef; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; padding: 20px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; overflow: hidden; }
        .input-field { padding: 12px; border: 1px solid var(--border); border-radius: 8px; width: 100%; margin-top: 5px; }
        .btn { padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; display: block; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ff4d4d; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto">
        <div class="card p-6">
            <h2 class="text-xl font-bold text-blue-600 mb-4">Customer Info</h2>
            <label>Customer Name</label>
            <input type="text" id="customerName" class="input-field" placeholder="Enter Name">
            <label class="mt-4 block">Order Date</label>
            <input type="date" id="orderDate" class="input-field">
        </div>

        <div class="card p-6">
            <h2 class="text-xl font-bold text-blue-600 mb-4">Rate Settings</h2>
            <div class="grid grid-cols-2 gap-4">
                <div><label>Weight Rate (¥)</label><input type="number" id="kgRate" value="20" class="input-field"></div>
                <div><label>Exchange Rate</label><input type="number" id="exchangeRate" value="630" class="input-field"></div>
            </div>
        </div>

        <button id="export-btn" class="btn btn-danger">Export PDF with Background</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script>
        const { jsPDF } = window.jspdf;

        // 【核心修改：删除黑角，加载背景图】
        async function drawCustomBackground(doc) {
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            // 1. 尝试加载 bg.png
            const bgImg = new Image();
            bgImg.src = 'bg.png'; // 你在 GitHub 上的图片名
            
            await new Promise(resolve => { bgImg.onload = resolve; bgImg.onerror = resolve; });

            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                doc.setGState(new doc.GState({ opacity: 0.15 })); // 0.15 是透明度，数字越小背景越淡
                doc.addImage(bgImg, 'PNG', 0, 0, pageWidth, pageHeight);
                doc.setGState(new doc.GState({ opacity: 1 }));
            }
            
            // 2. 尝试加载 logo.png (左上角)
            const logoImg = new Image();
            logoImg.src = 'logo.png';
            await new Promise(resolve => { logoImg.onload = resolve; logoImg.onerror = resolve; });
            if (logoImg.complete && logoImg.naturalWidth !== 0) {
                doc.addImage(logoImg, 'PNG', 10, 10, 20, 20);
            }
        }

        document.getElementById('export-btn').addEventListener('click', async () => {
            const doc = new jsPDF();
            const name = document.getElementById('customerName').value || "Customer";
            
            // 执行画背景（没有画三角形的代码，所以不会有黑角）
            await drawCustomBackground(doc);

            // 写入内容
            doc.setFontSize(20);
            doc.text("FREIGHT REPORT", 105, 30, { align: 'center' });
            doc.setFontSize(12);
            doc.text(`Customer: ${name}`, 20, 50);
            doc.text(`Date: ${document.getElementById('orderDate').value}`, 20, 60);

            // 保存
            doc.save(`${name}_Report.pdf`);
        });
    </script>
</body>
</html>
